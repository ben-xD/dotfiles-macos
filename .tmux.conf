# reload with `tmux source-file ~/.tmux.conf`
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"
set -g display-time 500
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g mouse on
set -g set-clipboard on
set-window-option -g mode-keys vi
bind c copy-mode
# Copy to system clipboard via OSC 52 (works locally and over SSH).
# Stays in copy mode so scroll position is preserved.
bind -T copy-mode-vi y send -X copy-selection-no-clear
bind -T copy-mode-vi Enter send -X copy-selection-no-clear
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
set-option -g repeat-time 1000

# Quality of life
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g focus-events on
set -g default-terminal "tmux-256color"
set -g escape-time 10
set -g allow-rename on
setw -g automatic-rename on

# Ctrl + K to clear tmux scrollback buffer
bind-key -n C-k send-keys -R \; clear-history

bind-key S command-prompt -p "session:" "new-session -A -s '%%'"

# --- Theme -----------------------------------------------------------
%if "#{==:#{SSH_TTY},}"
# Local: blue & gold
set -g status-style "bg=#0057B7,fg=#ffffff,bold"
set -g message-style "bg=#0057B7,fg=#ffffff,bold"
set -g mode-style "bg=#0057B7,fg=#ffffff,bold"

set -g status-left-length 50
set -g status-left "#[bg=#FFD700,fg=#000000,bold]  #S #[bg=#0057B7,fg=#FFD700]"
set -g status-right "#[fg=#003F8A,bg=#0057B7]#[bg=#003F8A,fg=#ffffff]  #H "
set -g window-status-format "#[fg=#0057B7,bg=#1A6FCC]#[bg=#1A6FCC,fg=#ffffff]  #I: #W #[fg=#1A6FCC,bg=#0057B7]"
set -g window-status-current-format "#[fg=#0057B7,bg=#FFD700]#[bg=#FFD700,fg=#000000,bold]  #I: #W #[fg=#FFD700,bg=#0057B7]"
set -g window-status-style "fg=colour253"
set -g window-status-separator ""

set -g pane-border-style "fg=#0057B7"
set -g pane-active-border-style "fg=#FFD700"
set -g pane-border-status top
set -g pane-border-format "#{?pane_in_mode,#[bg=#FFD700 fg=#000000 bold] COPY ,}"
%else
# SSH: warm terracotta & charcoal
set -g status-style "bg=#CC7D5E,fg=#F9F9F7,bold"
set -g message-style "bg=#CC7D5E,fg=#F9F9F7,bold"
set -g mode-style "bg=#2D2D2B,fg=#F9F9F7,bold"

set -g status-left-length 50
set -g status-left "#[bg=#2D2D2B,fg=#CC7D5E,bold]  #S #[bg=#CC7D5E,fg=#2D2D2B]"
set -g status-right "#[fg=#A86348,bg=#CC7D5E]#[bg=#A86348,fg=#F9F9F7]  #H "
set -g window-status-format "#[fg=#CC7D5E,bg=#D9987E]#[bg=#D9987E,fg=#2D2D2B]  #I: #W #[fg=#D9987E,bg=#CC7D5E]"
set -g window-status-current-format "#[fg=#CC7D5E,bg=#2D2D2B]#[bg=#2D2D2B,fg=#F9F9F7,bold]  #I: #W #[fg=#2D2D2B,bg=#CC7D5E]"
set -g window-status-style "fg=#F9F9F7"
set -g window-status-separator ""

set -g pane-border-style "fg=#CC7D5E"
set -g pane-active-border-style "fg=#F9F9F7"
set -g pane-border-status top
set -g pane-border-format "#{?pane_in_mode,#[bg=#CC7D5E fg=#F9F9F7 bold] COPY ,}"
%endif

# Pane styles
set -g window-style "bg=default,fg=default"
set -g window-active-style "bg=default,fg=default"

# --- F12: toggle outer tmux keybinds for nested sessions -------------
# Press F12 to disable the outer tmux (keys pass through to inner).
# Press F12 again to re-enable. Status bar dims to gray while off.
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "bg=#3a3a3a,fg=#888888" \;\
  set status-left "#[bg=#888888,fg=#3a3a3a,bold]  OFF #[bg=#3a3a3a,fg=#888888]" \;\
  set status-right "" \;\
  set window-status-current-format "#[fg=#3a3a3a,bg=#555555]#[bg=#555555,fg=#888888]  #I: #W #[fg=#555555,bg=#3a3a3a]" \;\
  set window-status-format "#[fg=#3a3a3a,bg=#444444]#[bg=#444444,fg=#777777]  #I: #W #[fg=#444444,bg=#3a3a3a]" \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u status-left \;\
  set -u status-right \;\
  set -u window-status-current-format \;\
  set -u window-status-format \;\
  refresh-client -S

# Toggle last window
bind Tab last-window

# New window in the same folder as the active pane
bind n new-window -c "#{pane_current_path}"

# Split panes in the same folder as the active pane
bind \\ split-window -h -c "#{pane_current_path}"
# Split panes and launch opencode; exec zsh keeps pane open after exit
bind \| split-window -h -c "#{pane_current_path}" 'zsh -ic "opencode; exec zsh"'
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}" 'zsh -ic "opencode; exec zsh"'
# Split panes and launch claude
bind = split-window -v -c "#{pane_current_path}" 'zsh -ic "claude; exec zsh"'
bind + split-window -h -c "#{pane_current_path}" 'zsh -ic "claude; exec zsh"'

# Navigate windows with Alt+[ and Alt+] (no prefix)
bind -n M-[ previous-window
bind -n M-] next-window

# Resize panes with vi-style keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Override tmux-sensible's reattach-to-user-namespace (not needed on modern macOS)
set -g default-command "${SHELL}"
